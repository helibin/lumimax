# Drone CI（自建 Drone Server + docker runner）
# 与根目录 .github/workflows 行为对齐：api / web 校验 + 可选构建并推送 lumimax:latest。
#
# 可参考 api/.drone.yml 的优化点（本文件已对齐）：
# - 关键步骤后增加飞书 webhook 成功/失败通知（需 Secret：FEISHU_WEBHOOK）
# - publish 与通知之间用 depends_on 串起 DAG
# - 若拉取 plugins/docker、plugins.webhook 较慢，可将 image 改为与 api/.drone.yml 相同的
#   自建镜像（如 cccr.ccs.tencentyun.com/ovlb/plugins.docker）
#
# 镜像推送密钥见 docs/Drone-CI.md
kind: pipeline
type: docker
name: docker-lumimax

platform:
  os: linux
  arch: amd64

clone:
  depth: 100

trigger:
  event:
    - push
    - tag
  ref:
    include:
      - refs/heads/main
      - refs/heads/master
      - refs/tags/v*

steps:
  - name: publish
    image: ccr.ccs.tencentyun.com/ovlb/plugins.docker
    settings:
      registry: hub.vlb.cn
      repo: hub.vlb.cn/work/lumimax
      dockerfile: docker/Dockerfile
      context: .
      username:
        from_secret: HARBOR_USERNAME
      password:
        from_secret: HARBOR_PASSWORD
      tags:
        - latest
      auto_tag: true

  - name: notify-feishu-success
    image: ccr.ccs.tencentyun.com/ovlb/plugins.webhook
    failure: ignore
    depends_on:
      - publish
    settings:
      urls:
        from_secret: FEISHU_WEBHOOK
      content_type: application/json
      template: |
        {
          "msg_type": "text",
          "content": {
            "text": "✅ 镜像 lumimax 构建/推送成功\n仓库：{{ repo.owner }}/{{ repo.name }}\n分支：{{ build.branch }}\n提交：{{ build.commit }}\n作者：{{ build.author }}\n流水线：{{ build.link }}"
          }
        }
    when:
      status:
        - success

  - name: notify-feishu-failure
    image: ccr.ccs.tencentyun.com/ovlb/plugins.webhook
    failure: ignore
    depends_on:
      - publish
    settings:
      urls:
        from_secret: FEISHU_WEBHOOK
      content_type: application/json
      template: |
        {
          "msg_type": "text",
          "content": {
            "text": "❌ 镜像 lumimax 构建/推送失败\n仓库：{{ repo.owner }}/{{ repo.name }}\n分支：{{ build.branch }}\n提交：{{ build.commit }}\n作者：{{ build.author }}\n流水线：{{ build.link }}"
          }
        }
    when:
      status:
        - failure
