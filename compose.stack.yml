# ======================================================================
# Lumimax 一体化栈（单业务镜像 + 依赖）
# - 业务镜像 lumimax:latest：nginx + 4 个 NestJS 进程 + admin/www 静态
# - 依赖：postgres / redis / rabbitmq / emqx
# - 宿主机 HTTP_PORT → 容器内 nginx 80
#
# 用法：
#   cp docker/.env.example .env
#   docker compose -f compose.stack.yml up -d --build
#   docker compose -f compose.stack.yml logs -f lumimax
# ==============================================================

include:
  - path: compose.infra.yml

services:
  lumimax:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        ADMIN_BASE: ${ADMIN_BASE:-/admin/}
        WWW_BASE: ${WWW_BASE:-/}
    image: ${LUMIMAX_IMAGE:-lumimax:latest}
    container_name: lumimax
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      emqx:
        condition: service_healthy
    expose:
      - 80
    ports:
      - '${LUMIMAX_HTTP_PORT:-8080}:80'
    environment:
      NODE_ENV: production
      DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lumimax}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必填且 >= 32 字符}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-root}:${RABBITMQ_PASSWORD:-root}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-tenant000000000000000}

      BASE_SERVICE_GRPC_URL: 127.0.0.1:4120
      BIZ_SERVICE_GRPC_URL: 127.0.0.1:4130
      IOT_SERVICE_GRPC_ENDPOINT: 127.0.0.1:4140

      IOT_RABBITMQ_QUEUE: ${IOT_RABBITMQ_QUEUE:-lumimax.q.iot.stream}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-lumimax.q.biz.events}

      STORAGE_VENDOR: ${STORAGE_VENDOR:-aws}
      STORAGE_REGION: ${STORAGE_REGION:-us-west-2}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-lumimax-dev}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-https://lumimax-dev.s3.us-west-2.amazonaws.com}
      STORAGE_UPLOAD_TTL_SECONDS: ${STORAGE_UPLOAD_TTL_SECONDS:-900}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}

      RABBITMQ_EVENTS_EXCHANGE: ${RABBITMQ_EVENTS_EXCHANGE:-lumimax.bus}
      RABBITMQ_EVENTS_EXCHANGE_TYPE: ${RABBITMQ_EVENTS_EXCHANGE_TYPE:-topic}

      IOT_VENDOR: ${IOT_VENDOR:-emqx}
      IOT_RECEIVE_MODE: ${IOT_RECEIVE_MODE:-mq}
      EMQX_BROKER_URL: ${EMQX_BROKER_URL:-mqtts://emqx:8883}
      EMQX_DEVICE_ENDPOINT: ${EMQX_DEVICE_ENDPOINT:-mqtts://127.0.0.1:8883}
      EMQX_HTTP_BASE_URL: ${EMQX_HTTP_BASE_URL:-http://emqx:18083}
      EMQX_AUTH_SECRET: ${EMQX_AUTH_SECRET:-replace-with-long-random-token}
      EMQX_MQTT_USERNAME: ${EMQX_MQTT_USERNAME:-lumimax_iot}
      EMQX_MQTT_CLIENT_CERT_PEM_PATH: ${EMQX_MQTT_CLIENT_CERT_PEM_PATH:-/app/certs/emqx/iot-service.crt}
      EMQX_MQTT_CLIENT_KEY_PEM_PATH: ${EMQX_MQTT_CLIENT_KEY_PEM_PATH:-/app/certs/emqx/iot-service.key}
      EMQX_ROOT_CA_PEM_PATH: ${EMQX_ROOT_CA_PEM_PATH:-/app/certs/emqx/ca.crt}
      EMQX_ROOT_CA_KEY_PEM_PATH: ${EMQX_ROOT_CA_KEY_PEM_PATH:-/app/certs/emqx/ca.key}

      DIET_VISION_PROVIDER: ${DIET_VISION_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DIET_NUTRITION_PROVIDER_ORDER: ${DIET_NUTRITION_PROVIDER_ORDER:-boohee,usda_fdc}

    volumes:
      - lumimax-logs:/app/logs
      - ./docker/emqx/certs:/app/certs/emqx
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:80/health -O /dev/null || exit 1
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lumimax

volumes:
  lumimax-logs:

networks:
  lumimax:
    name: ${LUMIMAX_NETWORK:-lumimax}
