        }
    when:
      status:
        - failure

---
kind: pipeline
type: docker
name: docker-lumimax

platform:
  os: linux
  arch: amd64

clone:
  depth: 100

trigger:
  event:
    - push
    - tag
  ref:
    include:
      - refs/heads/main
      - refs/heads/master
      - refs/heads/develop
      - refs/tags/v*

steps:
  - name: publish
    image: registry.cn-shenzhen.aliyuncs.com/ovlb/plugins.docker
    settings:
      registry:
        from_secret: docker_registry
      repo:
        from_secret: docker_repo
      dockerfile: docker/Dockerfile
      context: .
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags:
        - latest
      auto_tag: true

  - name: notify-feishu-success
    image: registry.cn-shenzhen.aliyuncs.com/ovlb/plugins/webhook
    failure: ignore
    depends_on:
      - publish
    settings:
      urls:
        from_secret: FEISHU_WEBHOOK
      content_type: application/json
      template: |
        {
          "msg_type": "text",
          "content": {
            "text": "✅ 镜像 lumimax 构建/推送成功\n仓库：{{ repo.owner }}/{{ repo.name }}\n分支：{{ build.branch }}\n提交：{{ build.commit }}\n作者：{{ build.author }}\n流水线：{{ build.link }}"
          }
        }
    when:
      status:
        - success

  - name: notify-feishu-failure
    image: registry.cn-shenzhen.aliyuncs.com/ovlb/plugins/webhook
    failure: ignore
    depends_on:
      - publish
    settings:
      urls:
        from_secret: FEISHU_WEBHOOK
      content_type: application/json
      template: |
        {
          "msg_type": "text",
          "content": {
            "text": "❌ 镜像 lumimax 构建/推送失败\n仓库：{{ repo.owner }}/{{ repo.name }}\n分支：{{ build.branch }}\n提交：{{ build.commit }}\n作者：{{ build.author }}\n流水线：{{ build.link }}"
          }
        }
    when:
      status:
        - failure
