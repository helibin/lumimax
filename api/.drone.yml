kind: pipeline
type: docker
name: lumimax-dev

trigger:
  branch:
    - main
  event:
    - push

steps:
  - name: build-gateway-image
    image: ccr.ccs.tencentyun.com/ovlb/plugins.docker
    settings:
      registry: hub.vlb.cn
      repo: hub.vlb.cn/work/lumimax.api-gateway
      dockerfile: Dockerfile
      context: .
      build_args:
        - APP_PKG=@lumimax/gateway
        - APP_DIR=gateway
        - APP_PORT=4000
        - APP_ENTRY=/app/dist/apps/gateway/src/main.js
        - APP_WORKDIR=/app/apps/gateway
      username:
        from_secret: HARBOR_USERNAME
      password:
        from_secret: HARBOR_PASSWORD
      tags:
        - latest

  - name: build-base-service-image
    image: ccr.ccs.tencentyun.com/ovlb/plugins.docker
    depends_on:
      - build-gateway-image
    settings:
      registry: hub.vlb.cn
      repo: hub.vlb.cn/work/lumimax.api-base
      dockerfile: Dockerfile
      context: .
      build_args:
        - APP_PKG=@lumimax/base-service
        - APP_DIR=base-service
        - APP_PORT=4020
        - APP_ENTRY=/app/dist/apps/base-service/src/main.js
        - APP_WORKDIR=/app/apps/base-service
      username:
        from_secret: HARBOR_USERNAME
      password:
        from_secret: HARBOR_PASSWORD
      tags:
        - latest

  - name: build-biz-service-image
    image: ccr.ccs.tencentyun.com/ovlb/plugins.docker
    depends_on:
      - build-base-service-image
    settings:
      registry: hub.vlb.cn
      repo: hub.vlb.cn/work/lumimax.api-biz
      dockerfile: Dockerfile
      context: .
      build_args:
        - APP_PKG=@lumimax/biz-service
        - APP_DIR=biz-service
        - APP_PORT=4030
        - APP_ENTRY=/app/dist/apps/biz-service/src/main.js
        - APP_WORKDIR=/app/apps/biz-service
      username:
        from_secret: HARBOR_USERNAME
      password:
        from_secret: HARBOR_PASSWORD
      tags:
        - latest

  - name: deploy-dev
    image: ccr.ccs.tencentyun.com/ovlb/alpine:3.19.1
    depends_on:
      - build-gateway-image
      - build-base-service-image
      - build-biz-service-image
    environment:
      DEPLOY_DEV:
        from_secret: DEPLOY_DEV
      DEV_HOST:
        from_secret: DEV_HOST
      DEV_DEPLOY_PATH:
        from_secret: DEV_DEPLOY_PATH
      DEV_SSH_USER:
        from_secret: DEV_SSH_USER
      DEV_SSH_KEY:
        from_secret: DEV_SSH_KEY
      HARBOR_USERNAME:
        from_secret: HARBOR_USERNAME
      HARBOR_PASSWORD:
        from_secret: HARBOR_PASSWORD
    commands:
      - apk add --no-cache openssh-client
      - |
        if [ "${DEPLOY_DEV:-}" != "true" ] || [ -z "${DEV_HOST:-}" ] || [ -z "${DEV_SSH_USER:-}" ] || [ -z "${DEV_SSH_KEY:-}" ]; then
          echo "skip dev deploy: DEPLOY_DEV/DEV_HOST/DEV_SSH_USER/DEV_SSH_KEY not configured"
          exit 0
        fi
      - mkdir -p ~/.ssh
      - printf '%s\n' "$DEV_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - |
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "$DEV_SSH_USER@$DEV_HOST" '
          DEPLOY_PATH="'"${DEV_DEPLOY_PATH:-/data/docker/lumimax}"'" &&
          cd "$DEPLOY_PATH" &&
          echo "IMAGE_TAG=latest" > .image.env &&
          docker login hub.vlb.cn -u "'"$HARBOR_USERNAME"'" -p "'"$HARBOR_PASSWORD"'" &&
          docker compose -f docker-compose.api.yml --env-file .env --env-file .image.env pull &&
          docker compose -f docker-compose.api.yml --env-file .env --env-file .image.env up -d &&
          docker image prune -f
        '

  - name: notify-feishu-success
    image: ccr.ccs.tencentyun.com/ovlb/plugins.webhook
    depends_on:
      - deploy-dev
    settings:
      urls:
        from_secret: FEISHU_WEBHOOK
      content_type: application/json
      template: |
        {
          "msg_type": "text",
          "content": {
            "text": "✅ 部署成功\n仓库：{{ repo.owner }}/{{ repo.name }}\n分支：{{ build.branch }}\n提交：{{ build.commit }}\n作者：{{ build.author }}\n流水线：{{ build.link }}"
          }
        }
    when:
      status:
        - success

  - name: notify-dev-failure
    image: ccr.ccs.tencentyun.com/ovlb/plugins.webhook
    depends_on:
      - build-gateway-image
      - build-base-service-image
      - build-biz-service-image
      - deploy-dev
    settings:
      urls:
        from_secret: FEISHU_WEBHOOK
      content_type: application/json
      template: |
        {
          "msg_type": "text",
          "content": {
            "text": "❌ 部署失败\n仓库：{{ repo.owner }}/{{ repo.name }}\n分支：{{ build.branch }}\n提交：{{ build.commit }}\n作者：{{ build.author }}\n流水线：{{ build.link }}"
          }
        }
    when:
      status:
        - failure

