# 构建 lumimax 单镜像并仅推送到自建 Harbor（hub.vlb.cn），结果飞书通知（可选）
#
# Secrets（仓库 Settings → Secrets and variables → Actions）：
#   HARBOR_USERNAME     — Harbor 登录用户（与 api Drone 一致时可复用）
#   HARBOR_PASSWORD     — Harbor 登录密码 / robot token
#   FEISHU_WEBHOOK      — 可选；飞书机器人 Webhook，未配置则跳过通知
#
# 如需修改 Harbor 上的完整路径，改下方 env HARBOR_IMAGE（默认 hub.vlb.cn/work/lumimax）。
name: Docker Lumimax

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HARBOR_IMAGE: hub.vlb.cn/work/lumimax

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: dev

    steps:
      - uses: actions/checkout@v4

      # 单镜像构建要求仓库根下存在完整 api/ + web/（与 Dockerfile COPY 一致）。
      # 若此处失败：99% 是 Git 把 api 记成 submodule（160000）但未配置 url，或 api 未 push；见 docs/Drone-CI.md §7。
      - name: Assert monorepo layout (Docker context)
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          missing=0
          need() {
            if [[ ! -e "$1" ]]; then
              echo "::error::Missing required path for Docker build: $1"
              missing=$((missing + 1))
            fi
          }
          need api/turbo.json
          need api/pnpm-lock.yaml
          need api/apps
          need api/scripts
          need web/package.json
          need web/pnpm-lock.yaml
          need web/apps
          if [[ "${missing}" -eq 0 ]]; then
            echo "Monorepo layout OK (api + web present)."
            exit 0
          fi
          echo "::group::Diagnostics (why files are missing)"
          echo "PWD=$(pwd)"
          ls -la
          echo "---- api (first 30 entries) ----"
          if [[ -d api ]]; then ls -la api | head -30; else echo "(no api directory)"; fi
          echo "---- web (first 20 entries) ----"
          if [[ -d web ]]; then ls -la web | head -20; else echo "(no web directory)"; fi
          echo "---- git ls-tree HEAD api ----"
          git ls-tree HEAD api || true
          echo "---- .gitmodules ----"
          if [[ -f .gitmodules ]]; then cat .gitmodules; else echo "(no .gitmodules)"; fi
          echo "---- git submodule status ----"
          git submodule status 2>&1 || true
          echo "::endgroup::"
          echo "::error::Fix the Git repository (not the workflow): ensure api/ and web/ exist as normal tracked trees on this branch. If git ls-tree shows mode 160000 for api, remove the broken submodule and recommit api as files — see docs/Drone-CI.md section 7."
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.HARBOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Login to Harbor (hub.vlb.cn)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: hub.vlb.cn
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build (and push on default branch / tag)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Feishu notify (success)
        if: success() && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "${WEBHOOK}" ]; then
            echo "FEISHU_WEBHOOK unset, skip notify"
            exit 0
          fi
          text="✅ Docker Lumimax 构建成功
          仓库: ${{ github.repository }}
          分支/Ref: ${{ github.ref_name }}
          提交: ${{ github.sha }}
          作者: ${{ github.actor }}
          镜像: ${{ env.HARBOR_IMAGE }}（tags 见 metadata）
          运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n --arg t "$text" '{msg_type:"text",content:{text:$t}}' | curl -fsS -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d @-

      - name: Feishu notify (failure)
        if: failure()
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "${WEBHOOK}" ]; then
            echo "FEISHU_WEBHOOK unset, skip notify"
            exit 0
          fi
          text="❌ Docker Lumimax 构建/推送失败
          仓库: ${{ github.repository }}
          分支/Ref: ${{ github.ref_name }}
          提交: ${{ github.sha }}
          作者: ${{ github.actor }}
          运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n --arg t "$text" '{msg_type:"text",content:{text:$t}}' | curl -fsS -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d @-
