services:
  admin-web:
    image: registry.cn-shenzhen.aliyuncs.com/ivlb/lumimax.web-admin:${IMAGE_TAG:-latest}
    container_name: lumimax-admin-web
    expose:
      - '8080'
    ports:
      - 5080:8080
    environment:
      API_UPSTREAM: '${API_UPSTREAM:-http://gateway:4000}'
    restart: unless-stopped
    networks:
      - lumimax

  www-web:
    image: registry.cn-shenzhen.aliyuncs.com/ivlb/lumimax.web-www:${IMAGE_TAG:-latest}
    container_name: lumimax-www-web
    expose:
      - '8080'
    ports:
      - 5081:8080
    environment:
      API_UPSTREAM: '${WWW_API_UPSTREAM:-http://gateway:4000}'
    restart: unless-stopped
    networks:
      - lumimax

networks:
  lumimax:
    name: ${LUMIMAX_NETWORK:-lumimax}
