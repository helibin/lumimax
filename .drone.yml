# Drone CI（自建 Drone Server + docker runner）
# 与根目录 .github/workflows 行为对齐：统一使用 BuildKit 构建 docker/Dockerfile，并推送 lumimax 标签。
#
# 可参考 api/.drone.yml 的优化点（本文件已对齐）：
# - 关键步骤后增加飞书 webhook 成功/失败通知（需 Secret：FEISHU_WEBHOOK）
# - publish 与通知之间用 depends_on 串起 DAG
# - 若拉取 plugins/docker、plugins.webhook 较慢，可将 image 改为与 api/.drone.yml 相同的
#   自建镜像（如 cccr.ccs.tencentyun.com/ovlb/plugins.docker）
#
# 注意：docker/Dockerfile 使用 RUN --mount=type=cache 等 BuildKit 语法；
# Drone runner 宿主机的 Docker daemon 需开启 BuildKit，否则 publish 会失败。
# 镜像推送密钥见 docs/Drone-CI.md
kind: pipeline
type: docker
name: docker-lumimax

platform:
  os: linux
  arch: amd64

clone:
  depth: 100

trigger:
  event:
    - push
    - tag
  ref:
    include:
      - refs/heads/main
      - refs/tags/*

steps:
  - name: publish
    image: ccr.ccs.tencentyun.com/ovlb/plugins.docker
    environment:
      DOCKER_BUILDKIT: "1"
    settings:
      registry: hub.vlb.cn
      repo: hub.vlb.cn/work/lumimax
      dockerfile: docker/Dockerfile
      context: .
      username:
        from_secret: HARBOR_USERNAME
      password:
        from_secret: HARBOR_PASSWORD
      tags:
        - latest
      auto_tag: true

  - name: deploy
    image: ccr.ccs.tencentyun.com/ovlb/alpine:3.19.1
    depends_on:
      - publish
    environment:
      DEV_HOST:
        from_secret: DEV_HOST
      DEV_DEPLOY_PATH:
        from_secret: DEV_DEPLOY_PATH
      DEV_SSH_USER:
        from_secret: DEV_SSH_USER
      DEV_SSH_KEY:
        from_secret: DEV_SSH_KEY
      HARBOR_USERNAME:
        from_secret: HARBOR_USERNAME
      HARBOR_PASSWORD:
        from_secret: HARBOR_PASSWORD
    when:
      branch:
        - main
      event:
        - push
    commands:
      - apk add --no-cache openssh-client
      - |
        TARGET_HOST="${DEV_HOST:-}"
        TARGET_USER="${DEV_SSH_USER:-}"
        TARGET_KEY="${DEV_SSH_KEY:-}"
        TARGET_PATH="${DEV_DEPLOY_PATH:-/data/docker/lumimax}"

        if [ -z "${TARGET_HOST}" ] || [ -z "${TARGET_USER}" ] || [ -z "${TARGET_KEY}" ]; then
          echo "skip dev deploy: target not configured"
          exit 0
        fi

        mkdir -p ~/.ssh
        printf '%s\n' "${TARGET_KEY}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519

        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "${TARGET_USER}@${TARGET_HOST}" '
          DEPLOY_PATH="'"${TARGET_PATH}"'" &&
          cd "$DEPLOY_PATH" &&
          echo "LUMIMAX_IMAGE=hub.vlb.cn/work/lumimax:latest" > .image.env &&
          docker login hub.vlb.cn -u "'"$HARBOR_USERNAME"'" -p "'"$HARBOR_PASSWORD"'" &&
          docker compose -f compose.stack.yml --env-file .env --env-file .image.env pull lumimax &&
          docker compose -f compose.stack.yml --env-file .env --env-file .image.env up -d &&
          docker image prune -f
        '

  - name: notify-feishu-success
    image: ccr.ccs.tencentyun.com/ovlb/plugins.webhook
    failure: ignore
    depends_on:
      - publish
      - deploy
    settings:
      urls:
        from_secret: FEISHU_WEBHOOK
      content_type: application/json
      template: |
        {
          "msg_type": "text",
          "content": {
            "text": "✅ 镜像 lumimax 构建/推送成功\n仓库：{{ repo.owner }}/{{ repo.name }}\n分支：{{ build.branch }}\n提交：{{ build.commit }}\n作者：{{ build.author }}\n流水线：{{ build.link }}"
          }
        }
    when:
      status:
        - success

  - name: notify-feishu-failure
    image: ccr.ccs.tencentyun.com/ovlb/plugins.webhook
    failure: ignore
    depends_on:
      - publish
      - deploy
    settings:
      urls:
        from_secret: FEISHU_WEBHOOK
      content_type: application/json
      template: |
        {
          "msg_type": "text",
          "content": {
            "text": "❌ 镜像 lumimax 构建/推送失败\n仓库：{{ repo.owner }}/{{ repo.name }}\n分支：{{ build.branch }}\n提交：{{ build.commit }}\n作者：{{ build.author }}\n流水线：{{ build.link }}"
          }
        }
    when:
      status:
        - failure
