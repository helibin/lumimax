# 生产多镜像 API 栈（gateway / base / biz / iot + 基础设施）
#
# 在仓库根目录：
#   docker compose -f api/compose.prod.yml --env-file .env up -d
#
# 在 api/ 目录：
#   docker compose -f compose.prod.yml --env-file ../.env up -d

include:
  - path: ../compose.infra.yml

x-common-env: &common_env
  NODE_ENV: ${NODE_ENV:-production}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://root:${RABBITMQ_PASSWORD:-rd}@rabbitmq:5672}
  RABBITMQ_EVENTS_EXCHANGE: ${RABBITMQ_EVENTS_EXCHANGE:-lumimax.bus}
  RABBITMQ_EVENTS_EXCHANGE_TYPE: ${RABBITMQ_EVENTS_EXCHANGE_TYPE:-topic}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  DB_URL: ${DB_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-rd}@postgres:5432/${POSTGRES_DB:-lumimax}}
  DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-tenant000000000000000}

x-iot-transport-env: &iot_transport_env
  IOT_VENDOR: ${IOT_VENDOR:-emqx}
  IOT_RECEIVE_MODE: ${IOT_RECEIVE_MODE:-mq}
  IOT_RABBITMQ_QUEUE: ${IOT_RABBITMQ_QUEUE:-lumimax.q.iot.stream}
  AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-}
  AWS_IOT_ENDPOINT: ${AWS_IOT_ENDPOINT:-}
  AWS_IOT_POLICY_NAME: ${AWS_IOT_POLICY_NAME:-}
  AWS_SQS_WAIT_TIME_SECONDS: ${AWS_SQS_WAIT_TIME_SECONDS:-10}
  AWS_SQS_VISIBILITY_TIMEOUT: ${AWS_SQS_VISIBILITY_TIMEOUT:-60}
  AWS_SQS_BATCH_SIZE: ${AWS_SQS_BATCH_SIZE:-5}
  AWS_SQS_IDLE_DELAY_MS: ${AWS_SQS_IDLE_DELAY_MS:-1000}
  EMQX_BROKER_URL: ${EMQX_BROKER_URL:-mqtts://emqx:8883}
  EMQX_REGION: ${EMQX_REGION:-self-hosted}
  EMQX_ROOT_CA_PEM: ${EMQX_ROOT_CA_PEM:-}
  EMQX_ROOT_CA_KEY_PEM: ${EMQX_ROOT_CA_KEY_PEM:-}
  EMQX_ROOT_CA_PEM_PATH: ${EMQX_ROOT_CA_PEM_PATH:-}
  EMQX_ROOT_CA_KEY_PEM_PATH: ${EMQX_ROOT_CA_KEY_PEM_PATH:-}
  EMQX_MQTT_USERNAME: ${EMQX_MQTT_USERNAME:-}
  EMQX_MQTT_PASSWORD: ${EMQX_MQTT_PASSWORD:-}
  EMQX_MQTT_CLIENT_CERT_PEM: ${EMQX_MQTT_CLIENT_CERT_PEM:-}
  EMQX_MQTT_CLIENT_KEY_PEM: ${EMQX_MQTT_CLIENT_KEY_PEM:-}
  EMQX_MQTT_CLIENT_CERT_PEM_PATH: ${EMQX_MQTT_CLIENT_CERT_PEM_PATH:-}
  EMQX_MQTT_CLIENT_KEY_PEM_PATH: ${EMQX_MQTT_CLIENT_KEY_PEM_PATH:-}
  EMQX_PUBLISH_MODE: ${EMQX_PUBLISH_MODE:-http}
  EMQX_HTTP_BASE_URL: ${EMQX_HTTP_BASE_URL:-http://emqx:18083}
  EMQX_HTTP_TLS_INSECURE: ${EMQX_HTTP_TLS_INSECURE:-}
  EMQX_API_KEY: ${EMQX_API_KEY:-}
  EMQX_API_SECRET: ${EMQX_API_SECRET:-}
  EMQX_AUTH_SECRET: ${EMQX_AUTH_SECRET:-}

services:
  base-service:
    image: registry.cn-shenzhen.aliyuncs.com/ivlb/lumimax.api-base:${IMAGE_TAG:-latest}
    container_name: lumimax-base-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '4020'
      - '4120'
    environment:
      <<: *common_env
      SERVICE_NAME: base-service
      HOST: 0.0.0.0
      HTTP_PORT: 4020
      GRPC_PORT: 4120
      STORAGE_VENDOR: ${STORAGE_VENDOR:-aws}
      STORAGE_BUCKET: ${STORAGE_BUCKET:?STORAGE_BUCKET is required}
      STORAGE_REGION: ${STORAGE_REGION:-us-west-2}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:?STORAGE_PUBLIC_BASE_URL is required}
      STORAGE_UPLOAD_TTL_SECONDS: ${STORAGE_UPLOAD_TTL_SECONDS:-900}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:4020/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lumimax

  biz-service:
    image: registry.cn-shenzhen.aliyuncs.com/ivlb/lumimax.api-biz:${IMAGE_TAG:-latest}
    container_name: lumimax-biz-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      base-service:
        condition: service_healthy
      iot-service:
        condition: service_healthy
    expose:
      - '4030'
      - '4130'
    environment:
      <<: *common_env
      SERVICE_NAME: biz-service
      HOST: 0.0.0.0
      HTTP_PORT: 4030
      GRPC_PORT: 4130
      BASE_SERVICE_GRPC_ENDPOINT: base-service:4120
      IOT_VENDOR: ${IOT_VENDOR:-emqx}
      IOT_RECEIVE_MODE: ${IOT_RECEIVE_MODE:-mq}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-lumimax.q.biz.events}
      IOT_DEVICE_OFFLINE_TIMEOUT: ${IOT_DEVICE_OFFLINE_TIMEOUT:-120}
      IOT_DEVICE_OFFLINE_INTERVAL: ${IOT_DEVICE_OFFLINE_INTERVAL:-30000}
      IOT_SERVICE_GRPC_ENDPOINT: iot-service:4140
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:4030/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lumimax

  iot-service:
    image: registry.cn-shenzhen.aliyuncs.com/ivlb/lumimax.api-iot:${IMAGE_TAG:-latest}
    container_name: lumimax-iot-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      emqx:
        condition: service_healthy
      base-service:
        condition: service_healthy
    expose:
      - '4040'
      - '4140'
    environment:
      <<: [*common_env, *iot_transport_env]
      SERVICE_NAME: iot-service
      HOST: 0.0.0.0
      HTTP_PORT: 4040
      GRPC_PORT: 4140
      BASE_SERVICE_GRPC_ENDPOINT: base-service:4120
      IOT_DEVICE_OFFLINE_TIMEOUT: ${IOT_DEVICE_OFFLINE_TIMEOUT:-120}
      IOT_DEVICE_OFFLINE_INTERVAL: ${IOT_DEVICE_OFFLINE_INTERVAL:-30000}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:4040/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lumimax

  gateway:
    image: registry.cn-shenzhen.aliyuncs.com/ivlb/lumimax.api-gateway:${IMAGE_TAG:-latest}
    container_name: lumimax-gateway
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      base-service:
        condition: service_healthy
      biz-service:
        condition: service_healthy
      iot-service:
        condition: service_healthy
    ports:
      - '${GATEWAY_PORT:-4000}:4000'
    environment:
      <<: *common_env
      SERVICE_NAME: gateway
      HOST: 0.0.0.0
      HTTP_PORT: 4000
      BASE_SERVICE_GRPC_ENDPOINT: base-service:4120
      BIZ_SERVICE_GRPC_ENDPOINT: biz-service:4130
      IOT_SERVICE_GRPC_ENDPOINT: iot-service:4140
      IOT_VENDOR: ${IOT_VENDOR:-emqx}
      IOT_RECEIVE_MODE: ${IOT_RECEIVE_MODE:-mq}
      EMQX_AUTH_SECRET: ${EMQX_AUTH_SECRET:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:4000/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lumimax

networks:
  lumimax:
    name: ${LUMIMAX_NETWORK:-lumimax}
