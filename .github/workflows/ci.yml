# 单仓 monorepo：在仓库根执行；分别安装 api/ 与 web/（两套 pnpm workspace，与 Makefile 一致）
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API (Nest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Architecture boundaries
        run: pnpm run arch:check

      - name: Lint
        run: pnpm run lint

      - name: Build platform
        run: pnpm run build

  web:
    name: Web (Vue)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build admin + www
        run: pnpm run build:admin && pnpm run build:www
