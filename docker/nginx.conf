user app;
worker_processes auto;
pid /tmp/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 2048;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile             on;
  tcp_nopush           on;
  tcp_nodelay          on;
  keepalive_timeout    65;
  types_hash_max_size  2048;
  server_tokens        off;

  client_max_body_size 20m;
  client_body_buffer_size 128k;
  client_body_temp_path /tmp/nginx/client_body;
  proxy_temp_path       /tmp/nginx/proxy;
  fastcgi_temp_path     /tmp/nginx/fastcgi;
  uwsgi_temp_path       /tmp/nginx/uwsgi;
  scgi_temp_path        /tmp/nginx/scgi;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/x-javascript application/xml
    application/json application/xml+rss
    image/svg+xml font/woff font/woff2 application/font-woff;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rid="$http_x_request_id" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  upstream gateway_upstream {
    server 127.0.0.1:4000;
    keepalive 32;
  }

  server {
    # 一体机默认对外端口（compose 映射 80:80）
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # ----- /api/* -> gateway（含 REST、/api/docs 聚合文档、/api/gateway-docs Swagger UI 静态） -----
    location ^~ /api/ {
      proxy_pass         http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   x-request-id      $http_x_request_id;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
      proxy_send_timeout    60s;
    }

    location = /api {
      return 301 /api/;
    }

    # ----- 根路径健康（便于探针；不经 /api） -----
    location = /health {
      access_log off;
      proxy_pass         http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_connect_timeout 5s;
      proxy_read_timeout    5s;
    }

    location ^~ /file/ {
      proxy_pass         http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----- /admin/ -> admin SPA -----
    location ^~ /admin/ {
      root /var/www;
      index index.html;
      try_files $uri $uri/ /admin/index.html;
    }
    location = /admin {
      return 301 /admin/;
    }


    # 微信公众号验证
    location ^~ /MP_verify_xxx.txt {
      default_type text/html;
      return 200 'xxx';
    }

    # ----- / -> www SPA -----
    location / {
      root /var/www/www;
      index index.html;
      try_files $uri $uri/ /index.html;

      location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        root /var/www/www;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
      }
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
      root /usr/share/nginx/html;
      internal;
    }
  }
}
