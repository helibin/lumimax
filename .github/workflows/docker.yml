# 构建 lumimax 单镜像并仅推送到自建 Harbor（hub.vlb.cn），结果飞书通知（可选）
#
# 本仓库工程上不采用 Git submodule；`api/`、`web/` 应为普通目录。
# 若 GitHub 历史上曾把 `api` 误记为 submodule（无 url），BuildKit 拉 Git 上下文时会默认
# `git submodule update` 并报错；context URL 已加 **?submodules=0**（见 Docker 文档 Git URL queries）。
# 根治仍建议在仓库里去掉错误的 160000 记录，仅依赖 query 可临时绕过。
#
# Secrets：HARBOR_USERNAME / HARBOR_PASSWORD / FEISHU_WEBHOOK（可选）
# 可变：env HARBOR_IMAGE（默认 hub.vlb.cn/work/lumimax）
name: Docker Lumimax

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HARBOR_IMAGE: hub.vlb.cn/work/lumimax

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: dev

    steps:
      # Git 上下文 URL：`?submodules=0` 禁止 BuildKit 递归子模块（避免远端误登记 api 为 gitlink 且无 url 时失败）。
      # ref 仍用 #<full_sha>；须为 40 位 commit（github.sha）。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Git 上下文 URL 含 ?submodules=0 需 BuildKit ≥0.24 + Dockerfile 前端 ≥1.18（见 docker/Dockerfile 首行）
          driver-opts: image=moby/buildkit:v0.24.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.HARBOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Login to Harbor (hub.vlb.cn)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: hub.vlb.cn
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build (and push on default branch / tag)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ format('{0}/{1}.git?submodules=0#{2}', github.server_url, github.repository, github.sha) }}
          file: docker/Dockerfile
          push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Feishu notify (success)
        if: success() && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "${WEBHOOK}" ]; then
            echo "FEISHU_WEBHOOK unset, skip notify"
            exit 0
          fi
          text="✅ Docker Lumimax 构建成功
          仓库: ${{ github.repository }}
          分支/Ref: ${{ github.ref_name }}
          提交: ${{ github.sha }}
          作者: ${{ github.actor }}
          镜像: ${{ env.HARBOR_IMAGE }}（tags 见 metadata）
          运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n --arg t "$text" '{msg_type:"text",content:{text:$t}}' | curl -fsS -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d @-

      - name: Feishu notify (failure)
        if: failure()
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "${WEBHOOK}" ]; then
            echo "FEISHU_WEBHOOK unset, skip notify"
            exit 0
          fi
          text="❌ Docker Lumimax 构建/推送失败
          仓库: ${{ github.repository }}
          分支/Ref: ${{ github.ref_name }}
          提交: ${{ github.sha }}
          作者: ${{ github.actor }}
          运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n --arg t "$text" '{msg_type:"text",content:{text:$t}}' | curl -fsS -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d @-
