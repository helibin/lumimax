# 构建 lumimax 单镜像并仅推送到自建 Harbor（hub.vlb.cn），结果飞书通知（可选）
#
# 本仓库 **无 Git submodule**：`api/`、`web/` 为普通目录，须已 push 到当前构建所用 `github.sha`。
# 构建上下文：BuildKit **Git 上下文**（按 github.sha 从远端拉取），不依赖 runner 上
# `actions/checkout` 后的工作区是否完整。
#
# Secrets：HARBOR_USERNAME / HARBOR_PASSWORD / FEISHU_WEBHOOK（可选）
# 可变：env HARBOR_IMAGE（默认 hub.vlb.cn/work/lumimax）
name: Docker Lumimax

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HARBOR_IMAGE: hub.vlb.cn/work/lumimax

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: dev

    steps:
      # 不使用 actions/checkout 作为 Docker 构建上下文：docker/build-push-action 默认
      # 使用 Git 上下文，直接从 ${{ github.server_url }}/${{ github.repository }}.git#${{ github.sha }}
      # 拉取与远端提交一致的树（含 .dockerignore），避免 runner 工作区异常/空目录导致 COPY 失败。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.HARBOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Login to Harbor (hub.vlb.cn)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: hub.vlb.cn
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build (and push on default branch / tag)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.server_url }}/${{ github.repository }}.git#${{ github.sha }}
          file: docker/Dockerfile
          push: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Feishu notify (success)
        if: success() && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "${WEBHOOK}" ]; then
            echo "FEISHU_WEBHOOK unset, skip notify"
            exit 0
          fi
          text="✅ Docker Lumimax 构建成功
          仓库: ${{ github.repository }}
          分支/Ref: ${{ github.ref_name }}
          提交: ${{ github.sha }}
          作者: ${{ github.actor }}
          镜像: ${{ env.HARBOR_IMAGE }}（tags 见 metadata）
          运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n --arg t "$text" '{msg_type:"text",content:{text:$t}}' | curl -fsS -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d @-

      - name: Feishu notify (failure)
        if: failure()
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "${WEBHOOK}" ]; then
            echo "FEISHU_WEBHOOK unset, skip notify"
            exit 0
          fi
          text="❌ Docker Lumimax 构建/推送失败
          仓库: ${{ github.repository }}
          分支/Ref: ${{ github.ref_name }}
          提交: ${{ github.sha }}
          作者: ${{ github.actor }}
          运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n --arg t "$text" '{msg_type:"text",content:{text:$t}}' | curl -fsS -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d @-
